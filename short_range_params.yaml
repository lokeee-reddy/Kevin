slam_toolbox:
  ros__parameters:
    # ==========================================
    # 🔦 SHORT-RANGE FLASHLIGHT MODE
    # ==========================================
    
    # 1. RANGE LIMIT (The Key Feature)
    # Only trust walls within 3.5 meters. 
    # This prevents distant "noise" from ruining the map.
    max_laser_range: 3.5
    
    # 2. AGGRESSIVE UPDATES
    # Update map constantly (every 0.3s) even if movement is tiny.
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    map_update_interval: 0.3
    
    # 3. LOOSE MATCHING
    # Trust the scan even if the match quality is low (2%)
    link_match_minimum_response_fine: 0.02
    loop_match_minimum_response_coarse: 0.10
    loop_match_minimum_response_fine: 0.20
    
    # 4. SMALLER SEARCH AREA
    # Since we only look 3.5m away, we don't need to remember 
    # walls 20m away. This saves CPU.
    scan_buffer_size: 40
    scan_buffer_maximum_scan_distance: 5.0
    link_scan_maximum_distance: 1.0

    # ==========================================
    # STANDARD CONNECTIONS (No Odom)
    # ==========================================
    base_frame: base_link
    odom_frame: base_link   # Robot body acts as odometry
    map_frame: map
    scan_topic: /scan
    mode: mapping 
    
    # Processing
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    throttle_scans: 1
    resolution: 0.05
    
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
    
    use_scan_matching: true
    use_scan_barycenter: true
    do_loop_closing: true
    enable_interactive_mode: true
