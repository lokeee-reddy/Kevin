slam_toolbox:
  ros__parameters:
    # ------------------------------------------------
    # AGGRESSIVE MAPPING (Force Updates)
    # ------------------------------------------------
    
    # 1. Force Constant Updates
    # Set these to 0.0 so it updates even if you hold your breath.
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    map_update_interval: 0.5
    
    # 2. Lower the "Quality Standards" (Crucial for Hand-Held)
    # Accept a match even if it's only 2% confident (Default is usually 10-20%)
    link_match_minimum_response_fine: 0.02
    loop_match_minimum_response_coarse: 0.10
    loop_match_minimum_response_fine: 0.20
    
    # 3. Widen the Search Area
    # If you move fast, look 1.0 meter away for the wall (Default is 0.5)
    link_scan_maximum_distance: 1.0
    
    # 4. Memory Settings
    scan_buffer_size: 40
    scan_buffer_maximum_scan_distance: 20.0
    
    # ------------------------------------------------
    # STANDARD CONNECTION LINKS
    # ------------------------------------------------
    base_frame: base_link
    odom_frame: base_link   # Keep this fixed link!
    map_frame: map
    scan_topic: /scan
    mode: mapping 
    
    # Processing
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    throttle_scans: 1
    resolution: 0.05
    max_laser_range: 12.0
    
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
    
    use_scan_matching: true
    use_scan_barycenter: true
    do_loop_closing: true
    enable_interactive_mode: true
